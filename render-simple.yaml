services:
  - type: web
    name: tablitsya3
    runtime: docker
    region: frankfurt
    plan: free
    branch: master
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:$PORT
    healthCheckPath: /
